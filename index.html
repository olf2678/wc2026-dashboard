<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FIFA World Cup 2026™ Boston Live</title>

<!-- TYPOGRAPHIE OFFICIELLE STYLE BOSTONFWC26 -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#071321;
  --card:#102540;
  --line:rgba(255,255,255,0.06);

  --cyan:#48d8ff;
  --blue:#2d6cff;
  --green:#9cff57;
  --gold:#ffd166;
  --soft:#9fb5d1;
  --live:#6eff7e;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Inter', system-ui, sans-serif;
  color:white;
  overflow:hidden;

  background:
  radial-gradient(circle at top left,#17385f 0%,#071321 45%),
  radial-gradient(circle at bottom right,#123459 0%,#071321 50%);
}

/* ================= HEADER BANNER ================= */

.hero-banner{
  position:relative;
  height:220px;

  background-image:
  linear-gradient(
    to bottom,
    rgba(0,0,0,.35),
    rgba(7,19,33,.92)
  ),
  url('https://media.licdn.com/dms/image/v2/D4E3DAQEVVoMcHtpilw/image-scale_191_1128/image-scale_191_1128/0/1684438652120/fwc26boston_cover?e=2147483647&v=beta&t=oARG6pnYBThQNVLsb0N_90fO8tTj5A6b7Yrm7JeIJt4');

  background-size:cover;
  background-position:center;

  border-bottom:1px solid rgba(255,255,255,.08);
}

.hero-overlay{
  height:100%;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:32px 40px;
}

/* LOGO OFFICIEL */
.boston-logo{
  width:78px;
  height:auto;
  object-fit:contain;
  filter: drop-shadow(0 0 18px rgba(72,216,255,.25));
}

/* TEXTES HEADER */

.title{
  font-size:34px;
  font-weight:900;
  letter-spacing:-1px;
  text-shadow:0 4px 20px rgba(0,0,0,.4);
}

.subtitle{
  font-size:13px;
  font-weight:500;
  letter-spacing:1.2px;
  text-transform:uppercase;
  color:#d6e7ff;
  margin-top:6px;
}

/* LIVE BADGE */

.live{
  display:flex;
  align-items:center;
  gap:10px;

  color:var(--live);
  font-weight:800;

  background:rgba(0,0,0,.25);
  padding:10px 16px;
  border-radius:999px;

  border:1px solid rgba(255,255,255,.08);
  backdrop-filter: blur(8px);
}

.dot{
  width:11px;
  height:11px;
  border-radius:50%;
  background:var(--live);
  animation:pulse 1s infinite;
}

@keyframes pulse{
  50%{opacity:.4; transform:scale(1.5);}
}

/* ================= MAIN LAYOUT ================= */

.container{
  display:grid;
  grid-template-columns:1.4fr 1fr;
  gap:24px;

  padding:24px;
  height:calc(100vh - 220px);
}

/* PANELS */

.panel{
  background:linear-gradient(180deg,rgba(16,37,64,.95),rgba(10,22,38,.95));
  border-radius:28px;
  padding:24px;

  border:1px solid var(--line);

  overflow:auto;
}

.panel h2{
  margin-top:0;
  margin-bottom:20px;
  color:var(--cyan);
  font-size:20px;
  font-weight:800;
  letter-spacing:.5px;
}

/* MATCHS */

.match{
  padding:18px;
  margin-bottom:14px;

  border-radius:18px;

  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
}

.match-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:14px;
}

.status{
  color:var(--gold);
  font-size:12px;
  font-weight:700;
}

.time{
  color:var(--soft);
  font-size:12px;
}

.teams{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.team{
  font-size:20px;
  font-weight:700;
}

.score{
  font-size:36px;
  font-weight:900;
  color:var(--live);
}

/* GROUPS */

.group{
  margin-bottom:26px;
}

.group-title{
  color:var(--gold);
  font-weight:800;
  margin-bottom:12px;
}

.row{
  display:grid;
  grid-template-columns:40px 1fr 60px;
  padding:10px 12px;
  margin-bottom:6px;

  border-radius:12px;
  background:rgba(255,255,255,.03);
}

.points{
  text-align:right;
  color:var(--cyan);
  font-weight:800;
}

/* FOOTER */

footer{
  position:absolute;
  bottom:8px;
  width:100%;
  text-align:center;
  font-size:11px;
  color:#7f97b5;
}

</style>

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="hero-banner">

  <div class="hero-overlay">

    <!-- LOGO -->
    <img
      class="boston-logo"
      src="https://whdh.com/wp-content/uploads/sites/3/2023/05/boston-2026.jpg?quality=60&strip=color"
      alt="Boston 2026 Logo"
    />

    <!-- TEXTE -->
    <div>
      <div class="title">FIFA WORLD CUP 2026™</div>
      <div class="subtitle">WE ARE BOSTON • LIVE MATCH CENTER</div>
    </div>

    <!-- LIVE -->
    <div class="live">
      <div class="dot"></div>
      LIVE
    </div>

  </div>

</header>

<!-- ================= CONTENT ================= -->

<div class="container">

  <div class="panel">
    <h2>LIVE MATCHES</h2>
    <div id="matches"></div>
  </div>

  <div class="panel">
    <h2>GROUP STANDINGS</h2>
    <div id="standings"></div>
  </div>

</div>

<footer>
Boston FIFA World Cup 2026™ Live Dashboard
</footer>

<!-- ================= SCRIPT ================= -->

<script>

const API_BASE = "https://wc2026api.com/api";
const API_KEY = "";

/* MATCHES */
async function loadMatches(){

  try{

    const res = await fetch(`${API_BASE}/matches/today?key=${API_KEY}`);
    const data = await res.json();

    const el = document.getElementById("matches");
    el.innerHTML = "";

    data.matches.forEach(m=>{

      el.innerHTML += `
      <div class="match">

        <div class="match-top">
          <div class="status">${m.status}</div>
          <div class="time">${m.time || ""}</div>
        </div>

        <div class="teams">
          <div class="team">${m.home_team}</div>

          <div class="score">
            ${m.home_score ?? 0} - ${m.away_score ?? 0}
          </div>

          <div class="team">${m.away_team}</div>
        </div>

      </div>
      `;

    });

  }catch(e){
    document.getElementById("matches").innerHTML = "Erreur chargement matchs";
  }

}

/* STANDINGS */
async function loadStandings(){

  try{

    const res = await fetch(`${API_BASE}/standings?key=${API_KEY}`);
    const data = await res.json();

    const el = document.getElementById("standings");
    el.innerHTML = "";

    data.groups.forEach(g=>{

      let html = `<div class="group">
        <div class="group-title">GROUP ${g.name}</div>`;

      g.teams.forEach((t,i)=>{

        html += `
        <div class="row">
          <div>${i+1}</div>
          <div>${t.name}</div>
          <div class="points">${t.points}</div>
        </div>`;
      });

      html += `</div>`;
      el.innerHTML += html;

    });

  }catch(e){
    document.getElementById("standings").innerHTML = "Erreur chargement standings";
  }

}

/* REFRESH */
async function refresh(){
  await loadMatches();
  await loadStandings();
}

refresh();
setInterval(refresh,10000);

</script>

</body>
</html>
