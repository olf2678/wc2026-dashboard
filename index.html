<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Live Multi-Sport Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#071321;
  --card:#102540;
  --line:rgba(255,255,255,0.06);

  --cyan:#48d8ff;
  --green:#9cff57;
  --gold:#ffd166;
  --soft:#9fb5d1;
  --live:#6eff7e;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Inter', system-ui, sans-serif;
  color:white;
  overflow:hidden;

  background:
  radial-gradient(circle at top left,#17385f 0%,#071321 45%),
  radial-gradient(circle at bottom right,#123459 0%,#071321 50%);
}

/* HEADER */
header{
  height:120px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 40px;

  background:rgba(0,0,0,.2);
  backdrop-filter: blur(10px);
  border-bottom:1px solid var(--line);
}

.title{
  font-size:28px;
  font-weight:900;
}

.subtitle{
  font-size:12px;
  color:#cfe6ff;
  text-transform:uppercase;
  letter-spacing:1px;
}

.live{
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--live);
  font-weight:800;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--live);
  animation:pulse 1s infinite;
}

@keyframes pulse{
  50%{opacity:.4;transform:scale(1.4);}
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:1.4fr 1fr;
  gap:20px;
  padding:20px;
  height:calc(100vh - 120px);
}

.panel{
  background:linear-gradient(180deg,rgba(16,37,64,.95),rgba(10,22,38,.95));
  border-radius:24px;
  padding:20px;
  overflow:auto;
  border:1px solid var(--line);
}

h2{
  margin:0 0 15px 0;
  color:var(--cyan);
}

/* MATCH */
.match{
  padding:16px;
  margin-bottom:12px;
  border-radius:14px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
}

.match-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-size:12px;
  color:var(--gold);
}

.teams{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.team{
  font-weight:700;
}

.score{
  font-size:28px;
  font-weight:900;
  color:var(--live);
}

/* SPORT TAG */
.sport{
  color:#9fb5d1;
  font-size:11px;
}

/* STANDINGS */
.group{
  margin-bottom:20px;
}

.group-title{
  color:var(--gold);
  font-weight:800;
  margin-bottom:10px;
}

.row{
  display:grid;
  grid-template-columns:40px 1fr 50px;
  padding:8px;
  background:rgba(255,255,255,.03);
  margin-bottom:6px;
  border-radius:10px;
}

.points{
  text-align:right;
  color:var(--cyan);
  font-weight:800;
}

footer{
  position:absolute;
  bottom:6px;
  width:100%;
  text-align:center;
  font-size:11px;
  color:#7f97b5;
}

</style>
</head>

<body>

<header>

  <div>
    <div class="title">LIVE MULTI-SPORT DASHBOARD</div>
    <div class="subtitle">Football • Basketball • Tennis • Simulation Mode</div>
  </div>

  <div class="live">
    <div class="dot"></div>
    LIVE
  </div>

</header>

<div class="container">

  <div class="panel">
    <h2>LIVE MATCHES</h2>
    <div id="matches"></div>
  </div>

  <div class="panel">
    <h2>STANDINGS</h2>
    <div id="standings"></div>
  </div>

</div>

<footer>
Multi-sport live dashboard (ready for API integration)
</footer>

<script>

/* ================= FAKE MULTI-SPORT LIVE ================= */

let matches = [
  {sport:"Football", home:"Arsenal", away:"Man City", hs:1, as:0, status:"LIVE"},
  {sport:"Football", home:"PSG", away:"Marseille", hs:0, as:1, status:"LIVE"},
  {sport:"Basketball", home:"Lakers", away:"Celtics", hs:98, as:102, status:"Q4"},
  {sport:"Tennis", home:"Alcaraz", away:"Djokovic", hs:2, as:1, status:"SET 4"}
];

let standings = [
  {
    name:"Group A",
    teams:[
      {n:"France",p:6},
      {n:"Brazil",p:4},
      {n:"Mexico",p:1},
      {n:"Canada",p:0}
    ]
  },
  {
    name:"Group B",
    teams:[
      {n:"England",p:7},
      {n:"USA",p:5},
      {n:"Argentina",p:3},
      {n:"Japan",p:1}
    ]
  }
];

/* ================= RENDER MATCHES ================= */

function renderMatches(){

  const el = document.getElementById("matches");
  el.innerHTML = "";

  matches.forEach(m=>{

    el.innerHTML += `
      <div class="match">

        <div class="match-top">
          <div class="sport">${m.sport}</div>
          <div>${m.status}</div>
        </div>

        <div class="teams">
          <div class="team">${m.home}</div>

          <div class="score">
            ${m.hs} - ${m.as}
          </div>

          <div class="team">${m.away}</div>
        </div>

      </div>
    `;

  });

}

/* ================= RENDER STANDINGS ================= */

function renderStandings(){

  const el = document.getElementById("standings");
  el.innerHTML = "";

  standings.forEach(g=>{

    let html = `<div class="group">
      <div class="group-title">${g.name}</div>`;

    g.teams.forEach((t,i)=>{

      html += `
        <div class="row">
          <div>${i+1}</div>
          <div>${t.n}</div>
          <div class="points">${t.p}</div>
        </div>
      `;

    });

    html += `</div>`;
    el.innerHTML += html;

  });

}

/* ================= LIVE SIMULATION ================= */

function updateLive(){

  matches.forEach(m=>{

    if(Math.random() > 0.7){
      m.hs += Math.random() > 0.5 ? 1 : 0;
      m.as += Math.random() > 0.5 ? 1 : 0;
    }

  });

}

/* ================= INIT ================= */

function refresh(){

  updateLive();
  renderMatches();
  renderStandings();

}

refresh();
setInterval(refresh,4000);

</script>

</body>
</html>
