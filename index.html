<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Boston 2026 Live Dashboard (TEST MODE)</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#071321;
  --card:#102540;
  --line:rgba(255,255,255,0.06);

  --cyan:#48d8ff;
  --green:#9cff57;
  --gold:#ffd166;
  --soft:#9fb5d1;
  --live:#6eff7e;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Inter', system-ui, sans-serif;
  color:white;
  overflow:hidden;

  background:
  radial-gradient(circle at top left,#17385f 0%,#071321 45%),
  radial-gradient(circle at bottom right,#123459 0%,#071321 50%);
}

/* ================= HEADER ================= */

.hero-banner{
  position:relative;
  height:220px;

  background-image:
  linear-gradient(to bottom, rgba(0,0,0,.35), rgba(7,19,33,.92)),
  url('https://media.licdn.com/dms/image/v2/D4E3DAQEVVoMcHtpilw/image-scale_191_1128/image-scale_191_1128/0/1684438652120/fwc26boston_cover?e=2147483647&v=beta&t=oARG6pnYBThQNVLsb0N_90fO8tTj5A6b7Yrm7JeIJt4');

  background-size:cover;
  background-position:center;

  border-bottom:1px solid rgba(255,255,255,.08);
}

.hero-overlay{
  height:100%;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:32px 40px;
}

/* LOGO */
.boston-logo{
  width:78px;
  height:auto;
  filter: drop-shadow(0 0 18px rgba(72,216,255,.25));
}

/* TEXT */
.title{
  font-size:34px;
  font-weight:900;
  letter-spacing:-1px;
}

.subtitle{
  font-size:13px;
  font-weight:500;
  letter-spacing:1.2px;
  text-transform:uppercase;
  color:#d6e7ff;
  margin-top:6px;
}

/* LIVE BADGE */
.live{
  display:flex;
  align-items:center;
  gap:10px;

  color:var(--live);
  font-weight:800;

  background:rgba(0,0,0,.25);
  padding:10px 16px;
  border-radius:999px;

  border:1px solid rgba(255,255,255,.08);
  backdrop-filter: blur(8px);
}

.dot{
  width:11px;
  height:11px;
  border-radius:50%;
  background:var(--live);
  animation:pulse 1s infinite;
}

@keyframes pulse{
  50%{opacity:.4; transform:scale(1.5);}
}

/* ================= LAYOUT ================= */

.container{
  display:grid;
  grid-template-columns:1.4fr 1fr;
  gap:24px;

  padding:24px;
  height:calc(100vh - 220px);
}

.panel{
  background:linear-gradient(180deg,rgba(16,37,64,.95),rgba(10,22,38,.95));
  border-radius:28px;
  padding:24px;

  border:1px solid var(--line);
  overflow:auto;
}

.panel h2{
  margin-top:0;
  margin-bottom:20px;
  color:var(--cyan);
  font-size:20px;
  font-weight:800;
}

/* MATCHES */
.match{
  padding:18px;
  margin-bottom:14px;
  border-radius:18px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
}

.match-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:14px;
}

.status{
  color:var(--gold);
  font-size:12px;
  font-weight:700;
}

.teams{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.team{
  font-size:20px;
  font-weight:700;
}

.score{
  font-size:36px;
  font-weight:900;
  color:var(--live);
}

/* STANDINGS */
.group{
  margin-bottom:26px;
}

.group-title{
  color:var(--gold);
  font-weight:800;
  margin-bottom:12px;
}

.row{
  display:grid;
  grid-template-columns:40px 1fr 60px;
  padding:10px 12px;
  margin-bottom:6px;
  border-radius:12px;
  background:rgba(255,255,255,.03);
}

.points{
  text-align:right;
  color:var(--cyan);
  font-weight:800;
}

/* FOOTER */
footer{
  position:absolute;
  bottom:8px;
  width:100%;
  text-align:center;
  font-size:11px;
  color:#7f97b5;
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="hero-banner">

  <div class="hero-overlay">

    <img class="boston-logo"
         src="https://toppng.com/uploads/preview/fifa-world-cup-26-boston-logo-11717900651vdfiulgozq.webp"
         alt="Boston 2026"/>

    <div>
      <div class="title">FIFA WORLD CUP 2026™</div>
      <div class="subtitle">WE ARE BOSTON • LIVE TEST MODE</div>
    </div>

    <div class="live">
      <div class="dot"></div>
      LIVE
    </div>

  </div>

</header>

<!-- CONTENT -->
<div class="container">

  <div class="panel">
    <h2>LIVE MATCHES</h2>
    <div id="matches"></div>
  </div>

  <div class="panel">
    <h2>GROUP STANDINGS</h2>
    <div id="standings"></div>
  </div>

</div>

<footer>
TEST MODE • Simulated live data (no API required)
</footer>

<script>

/* ================= FAKE LIVE DATA ================= */

const fakeMatches = [
  { home_team:"Arsenal", away_team:"Man City", home_score:1, away_score:0, status:"LIVE 42'" },
  { home_team:"Real Madrid", away_team:"Barcelona", home_score:2, away_score:2, status:"LIVE 67'" },
  { home_team:"Bayern", away_team:"Dortmund", home_score:3, away_score:1, status:"LIVE 55'" },
  { home_team:"PSG", away_team:"Marseille", home_score:0, away_score:1, status:"LIVE 33'" }
];

const fakeStandings = [
  {
    name:"A",
    teams:[
      {name:"France",points:6},
      {name:"Brazil",points:4},
      {name:"Mexico",points:1},
      {name:"Canada",points:0}
    ]
  },
  {
    name:"B",
    teams:[
      {name:"England",points:7},
      {name:"USA",points:5},
      {name:"Argentina",points:3},
      {name:"Japan",points:1}
    ]
  }
];

/* ================= RENDER MATCHES ================= */

function loadMatches(){

  const el = document.getElementById("matches");
  el.innerHTML = "";

  fakeMatches.forEach(m=>{

    el.innerHTML += `
      <div class="match">

        <div class="match-top">
          <div class="status">${m.status}</div>
        </div>

        <div class="teams">
          <div class="team">${m.home_team}</div>

          <div class="score">
            ${m.home_score} - ${m.away_score}
          </div>

          <div class="team">${m.away_team}</div>
        </div>

      </div>
    `;

  });

}

/* ================= RENDER STANDINGS ================= */

function loadStandings(){

  const el = document.getElementById("standings");
  el.innerHTML = "";

  fakeStandings.forEach(g=>{

    let html = `
      <div class="group">
      <div class="group-title">GROUP ${g.name}</div>
    `;

    g.teams.forEach((t,i)=>{

      html += `
        <div class="row">
          <div>${i+1}</div>
          <div>${t.name}</div>
          <div class="points">${t.points}</div>
        </div>
      `;

    });

    html += `</div>`;
    el.innerHTML += html;

  });

}

/* ================= LIVE SIMULATION ================= */

function updateScores(){

  fakeMatches.forEach(m=>{

    if(Math.random() > 0.7){
      m.home_score += Math.random() > 0.5 ? 1 : 0;
      m.away_score += Math.random() > 0.5 ? 1 : 0;
    }

  });

}

/* ================= INIT ================= */

function refresh(){

  updateScores();
  loadMatches();
  loadStandings();

}

refresh();
setInterval(refresh,5000);

</script>

</body>
</html>
